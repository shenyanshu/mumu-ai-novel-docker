services:
  mumuainovel:
    image: ${MUMUAINOVEL_IMAGE:-ghcr.io/shenyanshu/mumu-ai-novel-docker:latest}
    container_name: mumuainovel
    env_file:
      - ./.env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - app_logs:/app/logs
      - app_data:/app/data
    environment:
      APP_NAME: ${APP_NAME:-MuMuAINovel}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: ${DEBUG:-false}

      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/mumuai.db}

      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-5}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
      DATABASE_POOL_RECYCLE: ${DATABASE_POOL_RECYCLE:-3600}
      DATABASE_POOL_PRE_PING: ${DATABASE_POOL_PRE_PING:-True}
      DATABASE_POOL_USE_LIFO: ${DATABASE_POOL_USE_LIFO:-True}

      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      DEFAULT_AI_PROVIDER: ${DEFAULT_AI_PROVIDER:-openai}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-4o-mini}
      DEFAULT_TEMPERATURE: ${DEFAULT_TEMPERATURE:-0.7}
      DEFAULT_MAX_TOKENS: ${DEFAULT_MAX_TOKENS:-2000}

      LINUXDO_CLIENT_ID: ${LINUXDO_CLIENT_ID:-}
      LINUXDO_CLIENT_SECRET: ${LINUXDO_CLIENT_SECRET:-}
      LINUXDO_REDIRECT_URI: ${LINUXDO_REDIRECT_URI:-http://localhost:8000/api/auth/linuxdo/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}

      LOCAL_AUTH_ENABLED: ${LOCAL_AUTH_ENABLED:-true}
      LOCAL_AUTH_USERNAME: ${LOCAL_AUTH_USERNAME:-admin}
      LOCAL_AUTH_DISPLAY_NAME: ${LOCAL_AUTH_DISPLAY_NAME:-本地管理员}
      LOCAL_AUTH_PASSWORD_FILE: /run/secrets/local_auth_password

      SESSION_EXPIRE_MINUTES: ${SESSION_EXPIRE_MINUTES:-120}
      SESSION_REFRESH_THRESHOLD_MINUTES: ${SESSION_REFRESH_THRESHOLD_MINUTES:-30}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    secrets:
      - local_auth_password

volumes:
  app_data:
    driver: local
  app_logs:
    driver: local

secrets:
  local_auth_password:
    file: ./secrets/local_auth_password.txt
